<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Michi Method Printer - dev harness</title>
	<!-- Same assets the WordPress plugin ships. This harness only reproduces the
	     container markup that michi-method.php would output, so you can develop
	     and test the whole tool without a WordPress install. -->
	<link rel="stylesheet" href="../assets/css/michi.css">
	<style>
		/* Harness-only chrome; not part of the plugin. */
		body {
			font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
			margin: 0;
			padding: 32px 16px;
			background: #141414;
			color: #f3f4f6;
		}
		.dev-header {
			max-width: 760px;
			margin: 0 auto 20px;
			color: #f3f4f6;
		}
		.dev-header h1 {
			margin: 0 0 4px;
			font-size: 20px;
		}
		.dev-header p {
			margin: 0;
			color: #9ca3af;
			font-size: 14px;
		}
		/* The tool renders its own card (background, padding, radius), so this
		   is just a centering wrapper. */
		.dev-card {
			max-width: 760px;
			margin: 0 auto;
		}
		@media print {
			/* Hide the harness chrome so only the plugin's print output shows. */
			.dev-card {
				margin: 0;
				max-width: none;
			}
			.dev-header {
				display: none;
			}
		}
	</style>
</head>
<body>
	<div class="dev-header">
		<h1>Michi Method Printer - dev harness</h1>
		<p>Standalone test page. Serve from the plugin folder with: <code>python3 -m http.server</code> then open <code>/dev/</code>.</p>
	</div>

	<div class="dev-card">
		<!-- This mirrors exactly what michi_method_render_container() outputs. -->
		<div id="michi-method-app" class="michi-method"
			data-default-cols="3"
			data-default-rows="1"
			data-card-width-mm="63"
			data-card-height-mm="88"
			data-vgap-mm="2"
			data-hgap-mm="0"
			data-mark-color="black"
			data-default-units="mm">
			<noscript>This tool requires JavaScript to be enabled in your browser.</noscript>
		</div>
	</div>

	<script src="../assets/js/michi.js"></script>
</body>
</html>
